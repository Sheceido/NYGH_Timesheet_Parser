<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Medical Imaging - Ultrasound Schedule Parser</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="./icons8-timesheet-favicon.ico" type="image/x-icon">
</head>

<body>
  <header class="app-header">
    <span class="dept">Medical Imaging</span>
    <span class="sep"></span>
    <span class="app-name">Ultrasound Schedule Auditor</span>
    <span class="audit-planner-switch"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <!-- Top arrow -->
        <path d="M16 3l4 4-4 4" />
        <path d="M4 7h16" />
        <!-- Bottom arrow -->
        <path d="M8 21l-4-4 4-4" />
        <path d="M20 17H4" />
      </svg>
    </span>
  </header>
  <div class="auditor container">
    <paste-area></paste-area>
    <pre id="textAreaError" class="error"></pre>
    <control-panel mode="#timesheetMakerMode"></control-panel>
    <pre id="holidaysError" class="error"></pre>
    <mode-select-tab></mode-select-tab>

    <div id="timesheetMakerMode"></div>
    <div id="scheduleCheckerMode" class="not-visible"></div>
    <modal-schedule></modal-schedule>
  </div>
  <div class="planner container">
  </div>
  <footer></footer>

  <script type="module" src="./dist/scripts/main.js"></script>
</body>

</html>
